<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entities - DanielBrain Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="logo">DanielBrain</a>
    <a href="approvals.html">Approvals</a>
    <a href="entities.html" class="active">Entities</a>
  </nav>

  <div class="container">
    <h1>Entity Overview</h1>

    <div class="stats-grid" id="type-counts">
      <div class="loading">Loading stats...</div>
    </div>

    <h2 style="margin-bottom:12px">Top Entities by Mentions</h2>
    <table class="entity-table" id="top-table">
      <thead>
        <tr><th>Name</th><th>Type</th><th>Mentions</th></tr>
      </thead>
      <tbody>
        <tr><td colspan="3" class="loading">Loading...</td></tr>
      </tbody>
    </table>

    <h2 style="margin-bottom:12px">Recently Active</h2>
    <table class="entity-table" id="recent-table">
      <thead>
        <tr><th>Name</th><th>Type</th><th>Mentions</th><th>Last Seen</th></tr>
      </thead>
      <tbody>
        <tr><td colspan="4" class="loading">Loading...</td></tr>
      </tbody>
    </table>

    <h2 style="margin-bottom:12px">Proposal Status</h2>
    <div class="stats-grid" id="proposal-counts">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script>
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString();
    }

    async function loadStats() {
      try {
        const res = await fetch('/admin/api/entities/stats');
        const data = await res.json();

        // Type counts
        const countsEl = document.getElementById('type-counts');
        if (data.type_counts.length === 0) {
          countsEl.innerHTML = '<div class="empty-state">No entities yet.</div>';
        } else {
          countsEl.innerHTML = data.type_counts.map(tc =>
            '<div class="stat-card"><div class="number">' + tc.count + '</div>' +
            '<div class="label">' + escapeHtml(tc.entity_type) + '</div></div>'
          ).join('');
        }

        // Top entities
        const topBody = document.querySelector('#top-table tbody');
        if (data.top_entities.length === 0) {
          topBody.innerHTML = '<tr><td colspan="3" class="empty-state">No entities yet.</td></tr>';
        } else {
          topBody.innerHTML = data.top_entities.map(e =>
            '<tr><td>' + escapeHtml(e.name) + '</td>' +
            '<td><span class="badge badge-type">' + escapeHtml(e.entity_type) + '</span></td>' +
            '<td>' + e.mention_count + '</td></tr>'
          ).join('');
        }

        // Recent entities
        const recentBody = document.querySelector('#recent-table tbody');
        if (data.recent_entities.length === 0) {
          recentBody.innerHTML = '<tr><td colspan="4" class="empty-state">No entities yet.</td></tr>';
        } else {
          recentBody.innerHTML = data.recent_entities.map(e =>
            '<tr><td>' + escapeHtml(e.name) + '</td>' +
            '<td><span class="badge badge-type">' + escapeHtml(e.entity_type) + '</span></td>' +
            '<td>' + e.mention_count + '</td>' +
            '<td>' + formatDate(e.last_seen_at) + '</td></tr>'
          ).join('');
        }

        // Proposal counts
        const proposalEl = document.getElementById('proposal-counts');
        if (data.proposal_counts.length === 0) {
          proposalEl.innerHTML = '<div class="empty-state">No proposals yet.</div>';
        } else {
          proposalEl.innerHTML = data.proposal_counts.map(pc =>
            '<div class="stat-card"><div class="number">' + pc.count + '</div>' +
            '<div class="label">' + escapeHtml(pc.status) + '</div></div>'
          ).join('');
        }
      } catch (err) {
        document.getElementById('type-counts').innerHTML =
          '<div class="empty-state">Failed to load stats.</div>';
      }
    }

    loadStats();
  </script>
</body>
</html>
