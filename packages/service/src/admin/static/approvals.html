<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Approvals - TopiaBrain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a href="index.html" class="sidebar-logo">
        <span class="logo-icon">T</span>
        TopiaBrain
      </a>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Knowledge</div>
        <a href="browse.html" class="sidebar-link">
          <span class="link-icon">&#x1F4DA;</span> Browse
        </a>
        <a href="ingest.html" class="sidebar-link">
          <span class="link-icon">&#x2795;</span> Add Content
        </a>
        <a href="/chat" class="sidebar-link">
          <span class="link-icon">&#x1F4AC;</span> Chat
        </a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Manage</div>
        <a href="integrations.html" class="sidebar-link">
          <span class="link-icon">&#x1F50C;</span> Integrations
        </a>
        <a href="entities.html" class="sidebar-link">
          <span class="link-icon">&#x1F465;</span> Entities
        </a>
        <a href="approvals.html" class="sidebar-link active">
          <span class="link-icon">&#x2705;</span> Approvals
        </a>
        <a href="examples.html" class="sidebar-link">
          <span class="link-icon">&#x1F4DD;</span> Examples
        </a>
      </div>
      <div class="sidebar-spacer"></div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Approvals Queue</h1>
        <p>Review and approve pending proposals</p>
      </div>

      <div class="stats-grid" id="proposal-summary">
        <div class="loading">Loading stats</div>
      </div>

      <div id="flash"></div>

      <div class="tabs" id="status-tabs">
        <button class="tab active" data-status="">All <span class="count" id="count-all"></span></button>
        <button class="tab" data-status="pending">Pending <span class="count" id="count-pending"></span></button>
        <button class="tab" data-status="approved">Approved <span class="count" id="count-approved"></span></button>
        <button class="tab" data-status="applied">Applied <span class="count" id="count-applied"></span></button>
        <button class="tab" data-status="rejected">Rejected <span class="count" id="count-rejected"></span></button>
        <button class="tab" data-status="needs_changes">Needs Changes <span class="count" id="count-needs_changes"></span></button>
        <button class="tab" data-status="failed">Failed <span class="count" id="count-failed"></span></button>
      </div>

      <div id="bulk-actions" style="margin-bottom:16px; display:none">
        <button class="btn btn-changes" onclick="bulkReEnrich()" id="bulk-re-enrich-btn">Re-run All Rejected Enrichments</button>
        <span id="bulk-re-enrich-info" style="font-size:12px; color:var(--text-muted); margin-left:8px"></span>
      </div>

      <div id="proposals-list">
        <div class="loading">Loading proposals</div>
      </div>
    </main>
  </div>

  <script>
    let currentStatus = '';
    let proposals = [];

    function flash(message, type) {
      const el = document.getElementById('flash');
      el.innerHTML = '<div class="flash flash-' + type + '">' + escapeHtml(message) + '</div>';
      setTimeout(() => { el.innerHTML = ''; }, 4000);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function renderMarkdown(str) {
      if (!str) return '';
      let html = escapeHtml(str);
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      html = html.replace(/^### (.+)$/gm, '<strong style="font-size:14px">$1</strong>');
      html = html.replace(/^## (.+)$/gm, '<strong style="font-size:15px">$1</strong>');
      html = html.replace(/^# (.+)$/gm, '<strong style="font-size:16px">$1</strong>');
      html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
      html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul style="margin:4px 0 4px 16px;padding:0">$1</ul>');
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function renderProposedData(data) {
      let html = '';
      for (const [key, value] of Object.entries(data)) {
        const displayKey = key.replace(/_/g, ' ');
        let displayValue = String(value);
        if (typeof value === 'string' && value.startsWith('http')) {
          displayValue = '<a href="' + escapeHtml(value) + '" target="_blank" rel="noopener">' + escapeHtml(value) + '</a>';
        } else {
          displayValue = escapeHtml(displayValue);
        }
        html += '<div><span class="key">' + escapeHtml(displayKey) + ':</span> ' + displayValue + '</div>';
      }
      return html;
    }

    function renderEntityContext(ctx) {
      if (!ctx) return '';
      let html = '<div class="entity-context">';
      html += '<div class="entity-context-header">';
      html += '<strong>' + escapeHtml(ctx.name || '') + '</strong>';
      if (ctx.type) html += ' <span class="badge badge-type">' + escapeHtml(ctx.type) + '</span>';
      html += '</div>';
      if (ctx.profile) {
        html += '<div class="entity-profile">' + escapeHtml(ctx.profile) + '</div>';
      }
      if (ctx.recent_excerpts && ctx.recent_excerpts.length > 0) {
        html += '<div class="entity-excerpts"><div class="excerpts-label">How do we know this person:</div>';
        ctx.recent_excerpts.slice(0, 5).forEach(function(ex) {
          html += '<div class="excerpt-item">';
          html += '<span class="excerpt-text">' + escapeHtml(ex.excerpt) + '</span>';
          html += '<span class="excerpt-meta"> (' + escapeHtml(ex.source) + ', ' + formatDate(ex.created_at) + ')</span>';
          html += '</div>';
        });
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    function renderLinkedInDetails(data) {
      if (!data.linkedin_title && !data.linkedin_snippet) return '';
      let html = '<div class="linkedin-details">';
      if (data.linkedin_title) {
        html += '<div class="linkedin-title">' + escapeHtml(data.linkedin_title) + '</div>';
      }
      if (data.linkedin_snippet) {
        html += '<div class="linkedin-snippet">' + escapeHtml(data.linkedin_snippet) + '</div>';
      }
      html += '</div>';
      return html;
    }

    function renderCard(p) {
      const autoTag = p.auto_applied ? '<span class="badge badge-auto">Auto-applied</span>' : '';
      const statusBadge = '<span class="badge badge-' + p.status + '">' + escapeHtml(p.status) + '</span>';
      const typeBadge = '<span class="badge badge-type">' + escapeHtml(p.proposal_type) + '</span>';

      let actions = '';
      if (p.status === 'pending') {
        actions = '<div class="card-actions">' +
          '<button class="btn btn-approve" onclick="reviewProposal(\'' + p.id + '\', \'approve\')">Approve</button>' +
          '<button class="btn btn-reject" onclick="showNotes(\'' + p.id + '\', \'reject\')">Reject</button>' +
          '<button class="btn btn-changes" onclick="showNotes(\'' + p.id + '\', \'needs-changes\')">Needs Changes</button>' +
          '<input type="text" class="notes-input" id="notes-' + p.id + '" placeholder="Notes (optional)..." onkeydown="if(event.key===\'Enter\') submitWithNotes(\'' + p.id + '\')">' +
          '<button class="btn" id="submit-' + p.id + '" style="display:none" onclick="submitWithNotes(\'' + p.id + '\')">Submit</button>' +
          '</div>';
      } else if (p.status === 'needs_changes') {
        var urlFromNotes = (p.reviewer_notes || '').match(/https?:\/\/(?:www\.)?linkedin\.com\/in\/[^\s,)]+/);
        var currentUrl = urlFromNotes ? urlFromNotes[0] : ((p.proposed_data && p.proposed_data.linkedin_url) || '');
        actions = '<div class="card-actions-correction">' +
          '<label class="correction-label">Correct URL:</label>' +
          '<input type="text" class="correction-input" id="correction-' + p.id + '" value="' + escapeHtml(currentUrl) + '" placeholder="https://linkedin.com/in/...">' +
          '<button class="btn btn-approve" onclick="approveWithCorrection(\'' + p.id + '\')">Approve with Correction</button>' +
          '<button class="btn btn-reject" onclick="reviewProposal(\'' + p.id + '\', \'reject\')">Reject</button>' +
          '</div>';
      }

      // Rejected: delete + re-enrich
      if (p.status === 'rejected') {
        actions += '<div class="card-actions mt-8">';
        if (p.proposal_type === 'entity_enrichment') {
          actions += '<button class="btn btn-changes" onclick="reEnrich(\'' + p.id + '\')">Re-enrich</button>';
        }
        actions += '<button class="btn btn-reject btn-sm" onclick="deleteProposal(\'' + p.id + '\')">Delete</button>';
        actions += '</div>';
      }

      // Applied/failed enrichments: re-enrich
      if (p.proposal_type === 'entity_enrichment' && (p.status === 'applied' || p.status === 'failed')) {
        actions += '<div class="card-actions mt-8">' +
          '<button class="btn btn-changes" onclick="reEnrich(\'' + p.id + '\')">Re-enrich</button>' +
          '</div>';
      }

      // Editable notes for rejected and needs_changes
      if (p.status === 'rejected' || p.status === 'needs_changes') {
        actions += '<div class="card-actions mt-8" id="notes-section-' + p.id + '">' +
          '<strong style="font-size:12px;color:var(--text-secondary)">Notes:</strong>' +
          '<input type="text" class="notes-input visible" id="edit-notes-' + p.id + '" value="' + escapeHtml(p.reviewer_notes || '') + '" placeholder="Add notes..." style="flex:1">' +
          '<button class="btn btn-sm" onclick="saveNotes(\'' + p.id + '\')">Save</button>' +
          '</div>';
      } else if (p.reviewer_notes) {
        actions += '<div class="card-meta mt-8"><strong>Notes:</strong> ' + escapeHtml(p.reviewer_notes) + '</div>';
      }

      return '<div class="glass-card" id="card-' + p.id + '">' +
        '<div class="card-header">' +
          '<h3>' + escapeHtml(p.title) + '</h3>' +
          typeBadge + statusBadge + autoTag +
        '</div>' +
        (p.description ? '<div class="card-description">' + escapeHtml(p.description) + '</div>' : '') +
        renderEntityContext(p.entity_context) +
        renderLinkedInDetails(p.proposed_data || {}) +
        '<div class="proposed-data">' + renderProposedData(p.proposed_data) + '</div>' +
        '<div class="card-meta">Created: ' + formatDate(p.created_at) +
          (p.applied_at ? ' | Applied: ' + formatDate(p.applied_at) : '') +
          ' | Source: ' + escapeHtml(p.source) + '</div>' +
        actions +
      '</div>';
    }

    let pendingAction = {};

    function showNotes(id, action) {
      pendingAction = { id, action };
      document.getElementById('notes-' + id).classList.add('visible');
      document.getElementById('submit-' + id).style.display = 'inline-block';
      document.getElementById('notes-' + id).focus();
    }

    function submitWithNotes(id) {
      const notes = document.getElementById('notes-' + id).value;
      reviewProposal(pendingAction.id, pendingAction.action, notes);
    }

    async function approveWithCorrection(id) {
      var urlInput = document.getElementById('correction-' + id);
      var correctedUrl = urlInput.value.trim();
      if (!correctedUrl) {
        flash('Please enter a URL.', 'error');
        return;
      }
      try {
        var res = await fetch('/api/proposals/' + id + '/approve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            reviewer_notes: 'Manually corrected URL',
            proposed_data: { linkedin_url: correctedUrl },
          }),
        });
        var data = await res.json();
        if (res.ok) {
          flash('Proposal approved with corrected URL.', 'success');
          animateRemove(id);
          loadCounts();
        } else {
          flash(data.error || 'Action failed.', 'error');
        }
      } catch (err) {
        flash('Network error: ' + err.message, 'error');
      }
    }

    async function saveNotes(id) {
      var input = document.getElementById('edit-notes-' + id);
      var notes = input ? input.value.trim() : '';
      try {
        var res = await fetch('/api/proposals/' + id + '/notes', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reviewer_notes: notes || null }),
        });
        var data = await res.json();
        if (res.ok) {
          flash('Notes saved.', 'success');
        } else {
          flash(data.error || 'Failed to save notes.', 'error');
        }
      } catch (err) {
        flash('Network error: ' + err.message, 'error');
      }
    }

    async function deleteProposal(id) {
      if (!confirm('Permanently delete this rejected proposal?')) return;
      try {
        var res = await fetch('/api/proposals/' + id, {
          method: 'DELETE',
        });
        var data = await res.json();
        if (res.ok) {
          flash('Proposal deleted.', 'success');
          animateRemove(id);
          loadCounts();
        } else {
          flash(data.error || 'Delete failed.', 'error');
        }
      } catch (err) {
        flash('Network error: ' + err.message, 'error');
      }
    }

    function animateRemove(id) {
      var card = document.getElementById('card-' + id);
      if (card) {
        card.style.opacity = '0';
        card.style.transform = 'translateX(20px)';
        card.style.transition = 'all 0.3s ease';
        setTimeout(function() { card.remove(); }, 300);
      }
    }

    async function loadProposals() {
      const params = new URLSearchParams();
      if (currentStatus) params.set('status', currentStatus);
      params.set('limit', '50');

      try {
        const res = await fetch('/api/proposals?' + params.toString());
        const data = await res.json();
        proposals = data.proposals || [];

        const list = document.getElementById('proposals-list');
        if (proposals.length === 0) {
          list.innerHTML = '<div class="empty-state">No proposals found.</div>';
        } else {
          list.innerHTML = proposals.map(renderCard).join('');
        }
      } catch (err) {
        document.getElementById('proposals-list').innerHTML =
          '<div class="empty-state">Failed to load proposals.</div>';
      }
    }

    async function loadCounts() {
      try {
        const res = await fetch('/api/proposals?limit=0');
        const data = await res.json();
        document.getElementById('count-all').textContent = data.total || '';

        for (const status of ['pending', 'approved', 'applied', 'rejected', 'needs_changes', 'failed']) {
          const sRes = await fetch('/api/proposals?status=' + status + '&limit=0');
          const sData = await sRes.json();
          const el = document.getElementById('count-' + status);
          if (el) el.textContent = sData.total || '';
        }
        updateBulkActions();
      } catch (err) {}
    }

    async function reviewProposal(id, action, notes) {
      try {
        const body = notes ? { reviewer_notes: notes } : {};
        const res = await fetch('/api/proposals/' + id + '/' + action, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (res.ok) {
          flash('Proposal ' + (data.status || action) + ' successfully.', 'success');
          animateRemove(id);
          loadCounts();
        } else {
          flash(data.error || 'Action failed.', 'error');
        }
      } catch (err) {
        flash('Network error: ' + err.message, 'error');
      }
    }

    async function reEnrich(id) {
      if (!confirm('Reset this enrichment and re-run search with corrections?')) return;
      try {
        var res = await fetch('/api/proposals/' + id + '/re-enrich', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        var data = await res.json();
        if (res.ok) {
          flash(data.message || 'Reset for re-enrichment.', 'success');
          animateRemove(id);
          loadCounts();
        } else {
          flash(data.error || 'Re-enrich failed.', 'error');
        }
      } catch (err) {
        flash('Network error: ' + err.message, 'error');
      }
    }

    async function bulkReEnrich() {
      var count = document.getElementById('count-rejected').textContent;
      if (!confirm('Reset all ' + (count || '') + ' rejected enrichment proposals and re-run with corrections?')) return;

      var btn = document.getElementById('bulk-re-enrich-btn');
      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        var res = await fetch('/api/proposals/bulk/re-enrich-rejected', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        var data = await res.json();
        if (res.ok) {
          flash(data.message || 'Bulk reset complete.', 'success');
          loadProposals();
          loadCounts();
        } else {
          flash(data.error || 'Bulk re-enrich failed.', 'error');
        }
      } catch (err) {
        flash('Network error: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Re-run All Rejected Enrichments';
      }
    }

    function updateBulkActions() {
      var rejectedCount = parseInt(document.getElementById('count-rejected').textContent || '0', 10);
      var bulkDiv = document.getElementById('bulk-actions');
      var info = document.getElementById('bulk-re-enrich-info');
      if (rejectedCount > 0) {
        bulkDiv.style.display = 'block';
        info.textContent = rejectedCount + ' rejected proposal(s) will be reset and re-searched with correction examples.';
      } else {
        bulkDiv.style.display = 'none';
      }
    }

    document.getElementById('status-tabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.tab');
      if (!tab) return;

      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentStatus = tab.dataset.status;
      loadProposals();
    });

    async function loadProposalSummary() {
      try {
        const res = await fetch('/admin/api/proposals/stats');
        const data = await res.json();
        const el = document.getElementById('proposal-summary');
        if (data.status_counts.length === 0) {
          el.innerHTML = '<div class="empty-state">No proposals yet.</div>';
        } else {
          el.innerHTML = data.status_counts.map(function(sc) {
            return '<div class="stat-card"><div class="number">' + sc.count + '</div>' +
              '<div class="label">' + escapeHtml(sc.status) + '</div></div>';
          }).join('');
        }
      } catch (err) {
        document.getElementById('proposal-summary').innerHTML =
          '<div class="empty-state">Failed to load stats.</div>';
      }
    }

    loadProposals();
    loadCounts();
    loadProposalSummary();
  </script>
</body>
</html>
